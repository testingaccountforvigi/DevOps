# =============================================================
# monitoring/grafana-deployment.yaml
#
# Deploys Grafana with:
#   - Prometheus datasource auto-provisioned via ConfigMap
#   - Dashboard provider pointing to /var/lib/grafana/dashboards
#   - Default credentials:  admin / admin
#     (change GF_SECURITY_ADMIN_PASSWORD in production)
#   - NodePort service exposes UI at minikubeIP:32000
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    component: dashboard
spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana
      component: dashboard

  strategy:
    type: Recreate   # Avoid two instances writing to the same volume

  template:
    metadata:
      labels:
        app: grafana
        component: dashboard

    spec:
      # Run as the Grafana default UID (grafana image uses 472)
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472

      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # ── Environment variables ──────────────────────────
          env:
            # Default admin credentials
            # Replace GF_SECURITY_ADMIN_PASSWORD with a secret in prod
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"

            # Grafana server config
            - name: GF_SERVER_HTTP_PORT
              value: "3000"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:32000"

            # Allow anonymous access for easy dashboard viewing
            # Set to "false" for production
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"

            # Disable sign-up (no self-registration)
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"

            # Disable telemetry
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"

            # Plugin install — add more plugins here if needed
            - name: GF_INSTALL_PLUGINS
              value: ""

          # ── Volume mounts ──────────────────────────────────
          volumeMounts:
            # Auto-provisioned Prometheus datasource
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true

            # Dashboard provider config
            - name: grafana-dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true

            # Dashboard JSON storage (emptyDir — import from UI or
            # mount a ConfigMap with pre-built JSONs)
            - name: grafana-storage
              mountPath: /var/lib/grafana

            # Dashboard JSON directory (Grafana reads .json files here)
            - name: grafana-dashboards-dir
              mountPath: /var/lib/grafana/dashboards

          # ── Probes ─────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # ── Resource limits ────────────────────────────────
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "300m"
              memory: "256Mi"

      # ── Volumes ─────────────────────────────────────────────
      volumes:
        # Datasource provisioning ConfigMap
        - name: grafana-datasources
          configMap:
            name: grafana-datasources

        # Dashboard provider ConfigMap
        - name: grafana-dashboards-provider
          configMap:
            name: grafana-dashboards-provider

        # Grafana data directory (SQLite DB, sessions, etc.)
        - name: grafana-storage
          emptyDir: {}

        # Empty dir for dashboard JSONs — mount a ConfigMap here
        # to ship pre-built dashboards with the cluster
        - name: grafana-dashboards-dir
          emptyDir: {}

      restartPolicy: Always
