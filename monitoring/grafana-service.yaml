# =============================================================
# monitoring/grafana-service.yaml
#
# Exposes Grafana dashboard UI on NodePort 32000.
# Access it at:  http://<minikube-ip>:32000
# Login:         admin / admin
#
# Internal Grafana URL (for ingress or cross-namespace access):
#   http://grafana.monitoring.svc.cluster.local:3000
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    component: dashboard
  annotations:
    description: "Grafana dashboard UI — accessible on NodePort 32000"
spec:
  type: NodePort

  selector:
    app: grafana
    component: dashboard

  ports:
    - name: http
      port: 3000        # ClusterIP port (internal access)
      targetPort: 3000  # Grafana container port
      nodePort: 32000   # External port on minikube node
      protocol: TCP
