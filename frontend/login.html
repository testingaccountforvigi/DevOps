<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — LoanPro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-animated" data-page="login">

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">💰</div>
        <div>
          <div class="logo-text">LoanPro</div>
          <div class="logo-sub">Origination System</div>
        </div>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your account to continue</p>

      <!-- Alert -->
      <div id="alert-box" style="display:none"></div>

      <!-- Form -->
      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">Email address <span>*</span></label>
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input type="email" id="email" class="form-input"
              placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="form-error" id="email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password <span>*</span></label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="form-input"
              placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="pw-toggle" id="toggle-pw">👁️</button>
          </div>
          <div class="form-error" id="pass-error"></div>
        </div>

        <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
          <a href="#" style="font-size:13px;color:var(--accent-400)">Forgot password?</a>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary btn-full btn-lg">
          Sign In
        </button>
      </form>

      <!-- Demo credentials -->
      <div class="divider">Quick Demo Access</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <button id="demo-user" class="btn btn-ghost btn-sm">
          👤 User Demo
        </button>
        <button id="demo-admin" class="btn btn-ghost btn-sm">
          ⚙️ Admin Demo
        </button>
      </div>

      <p class="auth-footer">
        Don't have an account?
        <a href="register.html">Create one</a>
      </p>

    </div>
  </div>

  <!-- Decorative orbs -->
  <div style="position:fixed;top:-120px;left:-120px;width:400px;height:400px;
    background:radial-gradient(circle,rgba(37,99,235,0.12),transparent 70%);
    border-radius:50%;pointer-events:none;z-index:0"></div>
  <div style="position:fixed;bottom:-100px;right:-100px;width:360px;height:360px;
    background:radial-gradient(circle,rgba(30,77,140,0.15),transparent 70%);
    border-radius:50%;pointer-events:none;z-index:0"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
